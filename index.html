<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸运大转盘</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .controls {
            margin-bottom: 20px;
        }

        .controls label {
            font-size: 16px;
            margin-right: 10px;
        }

        .controls input[type="number"] {
            width: 80px;
            padding: 5px;
            font-size: 16px;
            text-align: center;
        }

        .controls button {
            padding: 5px 15px;
            font-size: 16px;
            margin-left: 10px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .controls button:hover {
            background-color: #27ae60;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        .wheel-container {
            position: relative;
            width: 520px;
            height: 550px;
            margin: 0 auto 30px;
        }

        #wheel {
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            display: block;
            margin-top: 30px;
            overflow: hidden;
        }

        .pointer {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff3333;
            z-index: 20;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.4));
        }

        .spin-btn {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            position: relative;
            z-index: 100;
        }

        .spin-btn:hover {
            background-color: #2980b9;
        }

        .spin-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            min-height: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>幸运大转盘</h1>
        <div class="controls">
            <label for="studentCount">项目数量: </label>
            <input type="number" id="studentCount" value="30">
            <button id="updateBtn">更新转盘</button>
            <br><br>
            <label for="fileInput">或导入项目名单(.txt): </label>
            <input type="file" id="fileInput" accept=".txt">
        </div>
        <div class="wheel-container">
            <div class="pointer"></div>
            <svg id="wheel" viewBox="-260 -260 520 520" width="520" height="520">
                <g id="wheelGroup"></g>
            </svg>
        </div>
        <button class="spin-btn" id="spinBtn">开始抽奖</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        let students = [];
        let currentRotation = 0; // 单位：度
        let isSpinning = false;

        const wheelGroup = document.getElementById('wheelGroup');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');
        const studentCountInput = document.getElementById('studentCount');
        const updateBtn = document.getElementById('updateBtn');
        const fileInput = document.getElementById('fileInput');

        const RADIUS = 256; // SVG 坐标系中的半径，viewBox 为 ±260

        const NS = 'http://www.w3.org/2000/svg';

        // 生成颜色数组
        function generateColors(count) {
            const baseColors = [
                '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7',
                '#DDA0DD', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E9',
                '#F8B500', '#00CED1', '#FF7F50', '#9370DB', '#32CD32',
                '#FF69B4', '#00BFFF', '#FFD700', '#8A2BE2', '#3CB371'
            ];
            const colors = [];
            for (let i = 0; i < count; i++) {
                colors.push(baseColors[i % baseColors.length]);
            }
            return colors;
        }

        // 创建 SVG 转盘（扇形 + 矢量文字统一在同一 <g> 内）
        function createWheel() {
            wheelGroup.innerHTML = '';
            wheelGroup.setAttribute('transform', `rotate(${currentRotation})`);

            if (students.length === 0) return;

            const n = students.length;
            const segAngleDeg = 360 / n;
            const segAngleRad = (2 * Math.PI) / n;
            const colors = generateColors(n);
            const fontSize = Math.max(9, Math.min(15, 320 / n));
            const textR = RADIUS * 0.65;

            for (let i = 0; i < n; i++) {
                const startRad = i * segAngleRad - Math.PI / 2;
                const endRad = startRad + segAngleRad;
                const midRad = startRad + segAngleRad / 2;

                // 扇形路径
                const x1 = RADIUS * Math.cos(startRad);
                const y1 = RADIUS * Math.sin(startRad);
                const x2 = RADIUS * Math.cos(endRad);
                const y2 = RADIUS * Math.sin(endRad);
                const largeArc = segAngleDeg > 180 ? 1 : 0;

                const path = document.createElementNS(NS, 'path');
                path.setAttribute('d', `M 0 0 L ${x1} ${y1} A ${RADIUS} ${RADIUS} 0 ${largeArc} 1 ${x2} ${y2} Z`);
                path.setAttribute('fill', colors[i]);
                path.setAttribute('stroke', 'rgba(255,255,255,0.6)');
                path.setAttribute('stroke-width', '1');
                wheelGroup.appendChild(path);

                // 矢量文字：统一从圆心沿半径方向向外排列
                const midDeg = midRad * 180 / Math.PI;
                const textTransform = `rotate(${midDeg}) translate(${textR}, 0)`;

                const text = document.createElementNS(NS, 'text');
                text.setAttribute('transform', textTransform);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'middle');
                text.setAttribute('font-size', fontSize);
                text.setAttribute('font-weight', 'bold');
                text.setAttribute('font-family', '"Microsoft YaHei", Arial, sans-serif');
                text.setAttribute('fill', '#333');
                text.textContent = students[i];
                wheelGroup.appendChild(text);
            }

            // 外边框圆
            const border = document.createElementNS(NS, 'circle');
            border.setAttribute('r', RADIUS);
            border.setAttribute('fill', 'none');
            border.setAttribute('stroke', '#fff');
            border.setAttribute('stroke-width', '6');
            wheelGroup.appendChild(border);

            // 中心圆点
            const center = document.createElementNS(NS, 'circle');
            center.setAttribute('r', '12');
            center.setAttribute('fill', '#fff');
            center.setAttribute('stroke', '#ddd');
            center.setAttribute('stroke-width', '2');
            wheelGroup.appendChild(center);
        }

        // 从localStorage加载保存的名单
        function loadFromStorage() {
            const saved = localStorage.getItem('luckyWheelStudents');
            if (saved) {
                students = JSON.parse(saved);
                studentCountInput.value = students.length;
                createWheel();
                return true;
            }
            return false;
        }

        // 保存名单到localStorage
        function saveToStorage() {
            localStorage.setItem('luckyWheelStudents', JSON.stringify(students));
        }

        // 初始化
        if (!loadFromStorage()) {
            students = Array.from({length: 30}, (_, i) => `${i + 1}`);
            studentCountInput.value = 30;
            createWheel();
        }

        // 更新学生列表
        function updateStudents(count) {
            students = Array.from({length: count}, (_, i) => `${i + 1}`);
            currentRotation = 0;
            createWheel();
            saveToStorage();
        }

        // 从文本文件加载项目名单
        function loadStudentsFromFile(file) {
            resultDiv.textContent = '加载中...';
            spinBtn.disabled = true;

            const reader = new FileReader();

            reader.onload = function(e) {
                const lines = e.target.result.split(/\r?\n/);
                const validLines = lines.filter(line => line.trim() !== '');

                if (validLines.length === 0) {
                    alert('文件中没有找到有效数据，请确保每行有一个项目名称');
                    spinBtn.disabled = false;
                    resultDiv.textContent = '';
                    return;
                }

                students = validLines.map(name => name.trim());
                studentCountInput.value = students.length;
                currentRotation = 0;
                createWheel();
                saveToStorage();
                spinBtn.disabled = false;
                resultDiv.textContent = '';
            };

            reader.onerror = function() {
                alert('文件读取失败，请重试');
                spinBtn.disabled = false;
                resultDiv.textContent = '';
            };

            reader.readAsText(file);
        }

        // 旋转转盘
        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;
            resultDiv.textContent = '';

            const extraRotations = 5 + Math.floor(Math.random() * 3);
            const randomExtra = Math.random() * 360;
            const targetRotation = currentRotation + extraRotations * 360 + randomExtra;

            const duration = 4000;
            const startTime = performance.now();
            const startRotation = currentRotation;
            const totalDelta = targetRotation - startRotation;

            // 数值模拟 cubic-bezier(0.34, 1.56, 0.64, 1)：先猛后缓，带轻微过冲回弹
            function bezierEase(t) {
                const x1 = 0.34, y1 = 1.56, x2 = 0.64, y2 = 1.0;
                let tp = t;
                for (let i = 0; i < 10; i++) {
                    const xc = 3*(1-tp)*(1-tp)*tp*x1 + 3*(1-tp)*tp*tp*x2 + tp*tp*tp;
                    const dx = 3*(1-tp)*(1-tp)*x1 + 6*(1-tp)*tp*(x2-x1) + 3*tp*tp*(1-x2);
                    if (Math.abs(dx) < 1e-8) break;
                    tp = Math.max(0, Math.min(1, tp - (xc - t) / dx));
                }
                return 3*(1-tp)*(1-tp)*tp*y1 + 3*(1-tp)*tp*tp*y2 + tp*tp*tp;
            }

            function animate(now) {
                const elapsed = now - startTime;
                const t = Math.min(elapsed / duration, 1);
                const angle = startRotation + totalDelta * bezierEase(t);
                wheelGroup.setAttribute('transform', `rotate(${angle})`);

                if (t < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentRotation = targetRotation;
                    isSpinning = false;
                    spinBtn.disabled = false;

                    // 计算停在哪个扇区
                    const segAngleDeg = 360 / students.length;
                    const normalizedAngle = ((-currentRotation % 360) + 360) % 360;
                    const selectedIndex = Math.floor(normalizedAngle / segAngleDeg) % students.length;
                    resultDiv.textContent = `幸运儿是: ${students[selectedIndex]}`;
                }
            }

            requestAnimationFrame(animate);
        }

        // 事件监听
        spinBtn.addEventListener('click', spinWheel);

        updateBtn.addEventListener('click', () => {
            const count = parseInt(studentCountInput.value);
            if (count >= 1) {
                updateStudents(count);
            } else {
                alert('请输入至少1个项目');
            }
        });

        studentCountInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') updateBtn.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.name.toLowerCase().endsWith('.txt')) {
                alert('请上传.txt格式的文件');
                fileInput.value = '';
                return;
            }
            loadStudentsFromFile(file);
        });
    </script>
</body>
</html>
